services:
  court:
    image: boluobobo/ai-court:latest
    build: .   # 本地构建备选（无预构建镜像时自动 build）
    container_name: ai-court
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"   # Gateway Dashboard
      - "127.0.0.1:18795:18795"   # 菠萝 GUI（可选）
    volumes:
      # 配置文件（可选挂载，也可通过 init-docker.sh 交互生成）
      # ⚠ 使用前请先创建文件：cp openclaw.example.json openclaw.json
      #   若文件不存在，Docker 会创建同名目录导致启动失败！
      - ./openclaw.json:/home/court/.openclaw/openclaw.json
      # 工作区持久化（记忆、日志等）
      - court-workspace:/home/court/clawd
      # OpenViking 数据持久化（可选）
      - court-openviking:/home/court/.openviking
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - OPENVIKING_CONFIG_FILE=${OPENVIKING_CONFIG_FILE}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  court-workspace:
  court-openviking:
